<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDG CSMU Event</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- INTRO SCREEN -->
<div class="intro">
    <h1>Chhatrapati Shivaji Maharaj University</h1>
</div>

<!-- MAIN BOX -->
<div class="main-box" id="mainBox">

    <div class="gdg-header">
        <h2>GDG - CSMU</h2>
    </div>

    <div class="button-section" id="buttonSection">
        <button onclick="openLogin()">Login</button>
        <button onclick="openSignup()">Sign Up</button>
    </div>

    <!-- LOGIN SPLIT -->
    <div class="split-box" id="loginSplit">
        <div class="left">
            <h3>Login</h3>
            <p>Enter your Email</p>
            <input type="email" placeholder="Email">
            <p>Password</p>
            <input type="password" placeholder="Password">
            <button class="blue-btn" onclick="showForm()">Login</button>
        </div>

        <div class="right">
            <h3>Don't have account?</h3>
            <button class="blue-btn" onclick="openSignup()">Register</button>
        </div>
    </div>

</div>

<!-- SIGNUP / EVENT FORM -->
<div class="event-form" id="eventForm">

<h1>🚀 Event Registration Form</h1>
<p>Register now to secure your spot!</p>

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" required>
</div>

<div class="form-group">
<label>College Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Select Year</label>
<select required>
<option value="">-- Select Year --</option>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
</div>

<div class="form-group">
<label>Branch</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Select Event Type</label>
<select required>
<option value="">-- Select --</option>
<option>Workshop</option>
<option>Seminar</option>
<option>Hackathon</option>
</select>
</div>

<button type="submit" class="blue-btn">Register</button>
<button type="reset" class="red-btn">Clear</button>

</form>

</div>

<script>
function openLogin(){
    document.getElementById("buttonSection").style.display="none";
    document.getElementById("loginSplit").style.display="flex";
}

function openSignup(){
    document.getElementById("mainBox").style.display="none";
    document.getElementById("eventForm").style.display="block";
}

function showForm(){
    document.getElementById("mainBox").style.display="none";
    document.getElementById("eventForm").style.display="block";
}
</script>

</body>
</html>
